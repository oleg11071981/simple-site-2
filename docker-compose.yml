version: "3.8"

services:
  web:
    image: nginx:latest
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./app:/var/www/html
      - ./configs/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php

  php:
    build:
      context: php
      args:
        INSTALL_XDEBUG: "true"
    environment:
      PHP_IDE_CONFIG: "serverName=PhpServerBase"
      CI_ENVIRONMENT: development
    volumes:
      - ./app:/var/www/html
      - ./php_ini/php.dev.ini:/usr/local/etc/php/php.ini

  mysql:
    image: mysql:8.0
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: simple_site2
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test
    volumes:
      - ./databases/mysql:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "127.0.0.1:8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
